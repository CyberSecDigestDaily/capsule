name: Daily capsule price check
on:
  schedule:
    - cron: "35 6 * * *"   # 06:35 UTC = 07:35 UK summer time
  workflow_dispatch:        # manual "Run now" button
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python scraper.py
      - name: Commit updated data
        run: |
          git config user.name "capsule-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "Daily price/stock update"
          git push
